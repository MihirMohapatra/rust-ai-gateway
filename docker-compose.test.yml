version: "3.9"

# Docker Compose for running integration tests
# Usage: docker-compose -f docker-compose.test.yml up --build --abort-on-container-exit

services:
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      - TEST_DATABASE_URL=postgres://postgres:postgres@test-postgres:5432/ai_gateway_test
      - TEST_REDIS_URL=redis://test-redis:6379
      - RUST_LOG=gateway=debug
      - RUST_BACKTRACE=1
    depends_on:
      test-postgres:
        condition: service_healthy
      test-redis:
        condition: service_started

  test-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_gateway_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  test-redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

