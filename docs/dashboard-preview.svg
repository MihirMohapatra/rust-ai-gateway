<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" fill="none">
  <!-- Background -->
  <rect width="900" height="520" rx="12" fill="#1e2433"/>
  <rect width="900" height="520" rx="12" stroke="#2e3446" stroke-width="1"/>

  <!-- Header -->
  <rect x="0" y="0" width="900" height="48" rx="12" fill="#242938"/>
  <rect x="0" y="36" width="900" height="12" fill="#242938"/>
  <rect x="20" y="14" width="22" height="22" rx="5" fill="#3b82f6"/>
  <text x="33" y="29" font-family="Arial" font-size="10" fill="white" text-anchor="middle" font-weight="bold">AI</text>
  <text x="52" y="30" font-family="Arial" font-size="14" fill="white" font-weight="bold">Gateway Dashboard</text>
  <circle cx="800" cy="24" r="4" fill="#34d399"/>
  <text x="810" y="28" font-family="Arial" font-size="11" fill="#6ee7b7">All Systems Healthy</text>

  <!-- Stat Cards -->
  <rect x="20" y="62" width="205" height="70" rx="8" fill="#2a3040" stroke="#3a4050"/>
  <text x="36" y="84" font-family="Arial" font-size="11" fill="#9ca3af">Total Requests</text>
  <text x="36" y="114" font-family="Arial" font-size="24" fill="white" font-weight="bold">15,234</text>

  <rect x="240" y="62" width="205" height="70" rx="8" fill="#2a3040" stroke="#3a4050"/>
  <text x="256" y="84" font-family="Arial" font-size="11" fill="#9ca3af">Total Tokens</text>
  <text x="256" y="114" font-family="Arial" font-size="24" fill="white" font-weight="bold">2.84M</text>

  <rect x="460" y="62" width="205" height="70" rx="8" fill="#2a3040" stroke="#3a4050"/>
  <text x="476" y="84" font-family="Arial" font-size="11" fill="#9ca3af">Avg Latency</text>
  <text x="476" y="114" font-family="Arial" font-size="24" fill="white" font-weight="bold">1.3 ms</text>

  <rect x="680" y="62" width="200" height="70" rx="8" fill="#2a3040" stroke="#3a4050"/>
  <text x="696" y="84" font-family="Arial" font-size="11" fill="#9ca3af">Uptime</text>
  <text x="696" y="114" font-family="Arial" font-size="24" fill="white" font-weight="bold">99.9%</text>

  <!-- Bar Chart Card -->
  <rect x="20" y="148" width="430" height="170" rx="8" fill="#2a3040" stroke="#3a4050"/>
  <text x="36" y="172" font-family="Arial" font-size="12" fill="white" font-weight="600">Requests by Model</text>

  <!-- Bar Chart Bars -->
  <rect x="50" y="190" width="160" height="18" rx="4" fill="#3b82f6"/>
  <text x="220" y="204" font-family="Arial" font-size="10" fill="#d1d5db">GPT-4 (40%)</text>
  <rect x="50" y="214" width="100" height="18" rx="4" fill="#8b5cf6"/>
  <text x="160" y="228" font-family="Arial" font-size="10" fill="#d1d5db">GPT-4o (25%)</text>
  <rect x="50" y="238" width="80" height="18" rx="4" fill="#10b981"/>
  <text x="140" y="252" font-family="Arial" font-size="10" fill="#d1d5db">Llama3 (20%)</text>
  <rect x="50" y="262" width="40" height="18" rx="4" fill="#f59e0b"/>
  <text x="100" y="276" font-family="Arial" font-size="10" fill="#d1d5db">Mistral (10%)</text>
  <rect x="50" y="286" width="20" height="18" rx="4" fill="#f43f5e"/>
  <text x="80" y="300" font-family="Arial" font-size="10" fill="#d1d5db">o1-mini (5%)</text>

  <!-- Doughnut Chart Card -->
  <rect x="465" y="148" width="415" height="170" rx="8" fill="#2a3040" stroke="#3a4050"/>
  <text x="481" y="172" font-family="Arial" font-size="12" fill="white" font-weight="600">Provider Distribution</text>

  <!-- Doughnut -->
  <circle cx="672" cy="245" r="50" fill="none" stroke="#2a3040" stroke-width="20"/>
  <circle cx="672" cy="245" r="50" fill="none" stroke="#8b5cf6" stroke-width="20" stroke-dasharray="204 110" stroke-dashoffset="0" transform="rotate(-90 672 245)"/>
  <circle cx="672" cy="245" r="50" fill="none" stroke="#10b981" stroke-width="20" stroke-dasharray="110 204" stroke-dashoffset="-204" transform="rotate(-90 672 245)"/>
  <text x="672" y="242" font-family="Arial" font-size="11" fill="#d1d5db" text-anchor="middle">65 / 35</text>
  <text x="672" y="256" font-family="Arial" font-size="9" fill="#9ca3af" text-anchor="middle">OpenAI / Ollama</text>

  <!-- Legend -->
  <rect x="510" y="290" width="10" height="10" rx="2" fill="#8b5cf6"/>
  <text x="526" y="299" font-family="Arial" font-size="11" fill="#d1d5db">OpenAI (65%)</text>
  <rect x="630" y="290" width="10" height="10" rx="2" fill="#10b981"/>
  <text x="646" y="299" font-family="Arial" font-size="11" fill="#d1d5db">Ollama (35%)</text>

  <!-- Line Chart Card -->
  <rect x="20" y="334" width="580" height="170" rx="8" fill="#2a3040" stroke="#3a4050"/>
  <text x="36" y="358" font-family="Arial" font-size="12" fill="white" font-weight="600">Latency Over Time (ms)</text>

  <!-- Line Chart - P50 -->
  <polyline points="50,460 120,455 190,458 260,440 330,435 400,442 470,450 540,458" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Line Chart - P99 -->
  <polyline points="50,440 120,445 190,442 260,420 330,415 400,425 470,435 540,442" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Fill under P50 -->
  <polygon points="50,460 120,455 190,458 260,440 330,435 400,442 470,450 540,458 540,480 50,480" fill="#10b981" opacity="0.1"/>

  <!-- Axis labels -->
  <text x="50" y="492" font-family="Arial" font-size="9" fill="#6b7280">00:00</text>
  <text x="190" y="492" font-family="Arial" font-size="9" fill="#6b7280">06:00</text>
  <text x="330" y="492" font-family="Arial" font-size="9" fill="#6b7280">12:00</text>
  <text x="470" y="492" font-family="Arial" font-size="9" fill="#6b7280">18:00</text>
  <text x="540" y="492" font-family="Arial" font-size="9" fill="#6b7280">24:00</text>

  <!-- Legend -->
  <rect x="200" y="365" width="10" height="3" rx="1" fill="#10b981"/>
  <text x="215" y="369" font-family="Arial" font-size="10" fill="#d1d5db">P50</text>
  <rect x="260" y="365" width="10" height="3" rx="1" fill="#f59e0b"/>
  <text x="275" y="369" font-family="Arial" font-size="10" fill="#d1d5db">P99</text>

  <!-- Services Card -->
  <rect x="615" y="334" width="265" height="170" rx="8" fill="#2a3040" stroke="#3a4050"/>
  <text x="631" y="358" font-family="Arial" font-size="12" fill="white" font-weight="600">Services</text>

  <!-- Service Items -->
  <rect x="631" y="370" width="233" height="28" rx="5" fill="#064e3b" opacity="0.3" stroke="#065f46" stroke-width="0.5"/>
  <circle cx="646" cy="384" r="3" fill="#34d399"/>
  <text x="656" y="388" font-family="Arial" font-size="11" fill="#e5e7eb">OpenAI</text>
  <text x="834" y="388" font-family="Arial" font-size="11" fill="#34d399" text-anchor="end">Online</text>

  <rect x="631" y="403" width="233" height="28" rx="5" fill="#064e3b" opacity="0.3" stroke="#065f46" stroke-width="0.5"/>
  <circle cx="646" cy="417" r="3" fill="#34d399"/>
  <text x="656" y="421" font-family="Arial" font-size="11" fill="#e5e7eb">Ollama</text>
  <text x="834" y="421" font-family="Arial" font-size="11" fill="#34d399" text-anchor="end">Online</text>

  <rect x="631" y="436" width="233" height="28" rx="5" fill="#064e3b" opacity="0.3" stroke="#065f46" stroke-width="0.5"/>
  <circle cx="646" cy="450" r="3" fill="#34d399"/>
  <text x="656" y="454" font-family="Arial" font-size="11" fill="#e5e7eb">PostgreSQL</text>
  <text x="834" y="454" font-family="Arial" font-size="11" fill="#34d399" text-anchor="end">Connected</text>

  <rect x="631" y="469" width="233" height="28" rx="5" fill="#064e3b" opacity="0.3" stroke="#065f46" stroke-width="0.5"/>
  <circle cx="646" cy="483" r="3" fill="#34d399"/>
  <text x="656" y="487" font-family="Arial" font-size="11" fill="#e5e7eb">Redis</text>
  <text x="834" y="487" font-family="Arial" font-size="11" fill="#34d399" text-anchor="end">Connected</text>
</svg>

